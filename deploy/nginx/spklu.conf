# =============================================
# Nginx site config — SPKLU web payment
# =============================================
# Pasang di VPS:
#   sudo cp deploy/nginx/spklu.conf /etc/nginx/sites-available/spklu
#   sudo ln -s /etc/nginx/sites-available/spklu /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default   # opsional, hilangkan default site
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prasyarat:
#   - Frontend sudah di-build dengan VITE_API_URL=http(s)://domain/api
#     (WAJIB akhiran /api — backend mount semua route di bawah prefix ini,
#     lihat spklu-backend/src/app.js & server.js)
#   - Copy dist/* ke /var/www/spklu/
#   - Backend jalan di 127.0.0.1:3001 (PM2)
#
# Setelah TLS aktif (certbot), certbot otomatis edit file ini menambah listen 443
# + sertifikat. Blok redirect http -> https juga ditangani certbot.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

client_max_body_size 128k;

server {
    listen 80;
    listen [::]:80;

    # Ganti ke domain produksi. Untuk uji IP tanpa domain: pakai _ (catch-all).
    server_name GANTI_DENGAN_DOMAIN_ANDA;

    access_log /var/log/nginx/spklu.access.log;
    error_log  /var/log/nginx/spklu.error.log warn;

    root /var/www/spklu;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;
    # CSP: pertahanan utama terhadap XSS karena token JWT hidup di
    # sessionStorage (bisa dibaca JS). Kebutuhan aplikasi:
    #   - script hanya dari origin sendiri (bundle Vite, tanpa inline script)
    #   - style 'unsafe-inline' (Tailwind/inline style React) + Google Fonts CSS
    #   - font dari Google Fonts (gstatic)
    #   - img: tile OpenStreetMap (a/b/c.tile.openstreetmap.org) + data: (Leaflet)
    #   - connect: API/WS origin sendiri + nominatim (geocoding admin)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org; connect-src 'self' https://nominatim.openstreetmap.org; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Semua backend (REST + WebSocket) hidup di bawah /api/ satu proxy saja —
    # backend server.js membedakan upgrade WS dari path /api/ws/device
    # & /api/ws/client sendiri, jadi tidak perlu location terpisah untuk WS.
    # WAJIB: header Upgrade + Connection "upgrade" (map di atas), tanpa ini
    # handshake WS gagal 400.
    # WS client membawa JWT di query string (?token=...) — jangan tulis URL
    # itu ke access log; token aktif tidak boleh menumpuk di file log server
    # (temuan security review #3).
    location /api/ws/ {
        access_log off;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        # Koneksi WS bertahan lama (ping/pong 30s dari backend) — beri window
        # 1 jam sebelum idle-timeout Nginx menutup koneksi.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering off;
    }

    # Cache asset hash (Vite output: *.js/*.css berisi hash di nama file)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: semua route non-/api/, non-/assets/ -> serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check ringan (opsional, untuk monitoring)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

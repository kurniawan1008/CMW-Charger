# =============================================
# Nginx site config — SPKLU web payment
# =============================================
# Pasang di VPS:
#   sudo cp deploy/nginx/spklu.conf /etc/nginx/sites-available/spklu
#   sudo ln -s /etc/nginx/sites-available/spklu /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default   # opsional, hilangkan default site
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prasyarat:
#   - Frontend sudah di-build: cd spklu-frontend && npm run build
#   - Copy dist/*  ke /var/www/spklu/
#   - Backend jalan di 127.0.0.1:3001 (PM2)
#
# Setelah TLS aktif (certbot), certbot otomatis edit file ini menambah listen 443
# + sertifikat. Blok redirect http -> https juga ditangani certbot.

# --- Batasi upload/body kecil supaya WS payload cap di backend (64KB) tidak dilewati proxy ---
client_max_body_size 128k;

# --- Log format ringkas + status ---
log_format spklu '$remote_addr - $remote_user [$time_local] '
                 '"$request" $status $body_bytes_sent '
                 '"$http_referer" "$http_user_agent" rt=$request_time';

server {
    listen 80;
    listen [::]:80;

    # Ganti ke domain produksi. Untuk uji IP tanpa domain: pakai _ (catch-all).
    server_name GANTI_DENGAN_DOMAIN_ANDA;

    access_log /var/log/nginx/spklu.access.log spklu;
    error_log  /var/log/nginx/spklu.error.log warn;

    # === 1) Static SPA (React build) ===
    root /var/www/spklu;
    index index.html;

    # Gzip untuk asset teks (JS/CSS/HTML/SVG/JSON)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        image/svg+xml;

    # Cache asset hash (Vite output: *.js/*.css berisi hash di nama file)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: semua route non-API/WS/asset -> serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # === 2) REST API -> backend Express ===
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Header identifikasi asal supaya rate-limiter di backend membaca IP asli
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout wajar
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # === 3) WebSocket — device (Pi gateway) & client (browser) ===
    # WAJIB: header Upgrade + Connection "upgrade". Tanpa ini WS handshake gagal 400.
    location /ws/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Koneksi WS bertahan lama (ping/pong 30s dari backend).
        # Berikan window 1 jam sebelum idle-timeout Nginx menutup koneksi.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 5s;

        # Nginx tidak buffering upgrade-connection
        proxy_buffering off;
    }

    # === 4) Security headers tambahan (backend juga set via helmet) ===
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # Health check ringan (opsional, untuk monitoring)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
